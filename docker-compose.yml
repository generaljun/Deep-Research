version: '3.8'
services:
  deep-research-web:
    build: .
    container_name: deep-research-web
    restart: always
    ports:
      - "3000:3000" # 宿主机端口:容器端口 (Lucky 反代 6789 -> 3000)
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
