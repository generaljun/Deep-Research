version: '3.8'
services:
  deep-research-web:
    build: .
    container_name: deep-research-web
    restart: always
    ports:
      - "6789:3000" # 宿主机端口:容器端口 (Lucky 反代 6789 -> 3000)
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=Asia/Shanghai
      - PUID=0
      - PGID=0
      - BOCHA_API_KEY=your_bocha_api_key_here
      - LLM_API_KEY=your_llm_api_key_here
      - LLM_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
