version: '3.8'
services:
  deep-research-web:
    build: .
    container_name: deep-research-web
    # 飞牛 NAS 推荐使用 host 模式，完美继承宿主机 DNS 和透明代理
    network_mode: "host"
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
